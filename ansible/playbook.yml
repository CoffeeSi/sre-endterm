- name: SRE Endterm Infrastructure Setup
  hosts: all
  become: true
  tasks:
    - name: Update apt cache and install prerequisite packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
          - python3-pip
        state: present
        update_cache: yes

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository to apt sources
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"
        state: present
        filename: docker

    - name: Install Docker Engine components
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Ensure Docker service is running and enabled
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Download Kind binary
      get_url:
        url: https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
        dest: /usr/local/bin/kind
        mode: '0755'
        owner: root
        group: root

    - name: Download kubectl binary
      get_url:
        url: https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'
        owner: root
        group: root

    - name: Check if Kind cluster already exists
      shell: kind get clusters | grep -q "endterm-cluster"
      register: cluster_check
      failed_when: false
      changed_when: false

    - name: Create Kind cluster
      shell: kind create cluster --name endterm-cluster
      when: cluster_check.rc != 0

    - name: Clone repository and deploy stack
      git:
        repo: 'https://github.com/CoffeeSi/sre-endterm.git'
        dest: /opt/sre-endterm
        force: yes

    - name: Build local microservice images via Docker Compose
      shell: docker compose build
      args:
        chdir: "/opt/sre-endterm"

    - name: Load local images into Kind cluster
      shell: "kind load docker-image {{ item }}:latest --name endterm-cluster"
      loop:
        - auth-service
        - user-service
        - product-service
        - order-service
        - chat-service
        - payment-service
        - api-gateway

    - name: Deploy application stack using Kubernetes manifests
      shell: kubectl apply -f "/opt/sre-endterm/kubernetes/"
  
    - name: Copy Prometheus configuration file
      template:
        src: /opt/sre-endterm/prometheus/prometheus.yml
        dest: /etc/prometheus/prometheus.yml

    - name: Ensure Prometheus config directory exists on host
      file:
        path: /etc/prometheus
        state: directory
        mode: '0755'

    - name: Copy Prometheus configuration file to destination
      copy:
        src: "/opt/sre-endterm/prometheus/prometheus.yml"
        dest: /etc/prometheus/prometheus.yml
        remote_src: yes

    - name: Apply monitoring manifests in Kubernetes
      shell: kubectl apply -f "/opt/sre-endterm/kubernetes/monitoring/"
      failed_when: false