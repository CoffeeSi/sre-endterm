apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: endterm-config
              key: FRONTEND_PORT
        envFrom:
        - configMapRef:
            name: endterm-config
