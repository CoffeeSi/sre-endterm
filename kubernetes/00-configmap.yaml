apiVersion: v1
kind: ConfigMap
metadata:
  name: endterm-config
data:
  DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/app_db"
  REDIS_URL: "redis://redis:6379/0"
  AUTH_SERVICE_URL: "http://auth-service:8000"
  USER_SERVICE_URL: "http://user-service:8001"
  PRODUCT_SERVICE_URL: "http://product-service:8002"
  ORDER_SERVICE_URL: "http://order-service:8003"
  PAYMENT_SERVICE_URL: "http://payment-service:8004"
  CHAT_SERVICE_URL: "http://chat-service:8005"
  API_GATEWAY_URL: "http://api-gateway:8080"
  FRONTEND_URL: "http://frontend:80"

  JWT_SECRET_KEY: "secret-key"
  JWT_ALGORITHM: "HS256"

  SERVICE_REPLICAS: "2"
  ORDER_SERVICE_REPLICAS: "3"

  AUTH_SERVICE_PORT: "8000"
  USER_SERVICE_PORT: "8001"
  PRODUCT_SERVICE_PORT: "8002"
  ORDER_SERVICE_PORT: "8003"
  PAYMENT_SERVICE_PORT: "8004"
  CHAT_SERVICE_PORT: "8005"
  API_GATEWAY_PORT: "8080"
  FRONTEND_PORT: "80"
